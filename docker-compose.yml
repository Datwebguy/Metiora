version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: metiora-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: metiora_production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  metiora-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: metiora-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/metiora_production?schema=public
      LOG_LEVEL: info
      API_BASE_URL: https://api.metiora.ai
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
